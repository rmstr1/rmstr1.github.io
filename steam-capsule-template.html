<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Capsule Asset Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="./css/fonts.css">
    <style>
        :root {
            --bg-color: #1B2838;
            --panel-bg: #1c2f43;
            --text-color: #c6d4df;
            --accent: #66c0f4;
            --accent-hover: rgb(172, 225, 255);
            --border: #bdbdbd;
        }

        body {
            font-family: "Source Sans 3", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .upload-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .drop-zone {
            flex: 1;
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            background: var(--panel-bg);
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .drop-zone.dragover {
            border-color: var(--accent);
            background: #2a475e;
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        .capsules-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .capsule-card {
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .preview-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 4px;
        }

        canvas {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            background: #000000;
        }

        .controls {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            background: #111a24;
            padding: 15px;
            border-radius: 6px;
        }

        .control-group h4 {
            margin: 0 0 10px 0;
            color: var(--accent);
        }

        .slider-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .slider-row label {
            width: 90px;
            font-size: 13px;
        }

        .slider-row input[type="range"] {
            flex: 1;
            margin: 0 10px;
        }

        .slider-row input[type="number"] {
            width: 60px;
            background: #000;
            color: #fff;
            border: 1px solid var(--border);
            padding: 4px;
            border-radius: 3px;
        }

        .btn-reset {
            background: #2a475e;
            color: #fff;
            border: none;
            padding: 4px 8px;
            margin-left: 8px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 12px;
            transition: background 0.1s;
        }

        .btn-reset:hover {
            background: var(--accent);
        }
    </style>
</head>

<body>

    <div class="header-bar">
        <div>
            <h1>Steam Asset Generator</h1>
            <p>Upload a Background and an SVG Logo to instantly generate composited Steam store/library capsules.</p>
        </div>
        <button id="btn-download" class="btn" disabled>Download All as ZIP</button>
    </div>

    <div class="upload-section">
        <div class="drop-zone" id="drop-bg" onclick="document.getElementById('file-bg').click()">
            <h3>Background Image</h3>
            <p>Drag & Drop or Click to browse (Square or 16:9 recommended)</p>
            <input type="file" id="file-bg" accept="image/png, image/jpeg, image/webp">
        </div>
        <div class="drop-zone" id="drop-logo" onclick="document.getElementById('file-logo').click()">
            <h3>Text Logo SVG</h3>
            <p>Drag & Drop or Click to browse (.svg or .png with transparency)</p>
            <input type="file" id="file-logo" accept=".svg, image/png">
        </div>
    </div>

    <div class="capsules-grid" id="capsules-container">
    </div>

    <script>
        // Images state
        let imgBg = null;
        let imgLogo = null;

        // Standard operational defaults
        const DEFAULTS = {
            bgS: 1.0, bgX: 0, bgY: 0,
            logoS: 1.0, logoX: 0, logoY: 0,
            vigStr: 0.25, // Strength: 0.0 to 1.0
            vigWid: 0.6  // Width: 0.0 to 1.0 (how far from center darkness starts)
        };

        // Configurations for the required Steam assets
        const configs = [
            {
                id: 'header',
                name: 'Header & Library Header Capsule',
                desc: 'Generates Header Capsule (920x430) & Library Header Capsule (920x430)',
                primaryW: 920, primaryH: 430,
                hasBg: true, hasLogo: true, hasVignette: true,
                outputs: [
                    { name: 'Header Capsule.png', w: 920, h: 430 },
                    { name: 'Library Header Capsule.png', w: 920, h: 430 }
                ]
            },
            {
                id: 'small',
                name: 'Small Capsule',
                desc: 'Generates Small Capsule (462x174)',
                primaryW: 462, primaryH: 174,
                hasBg: true, hasLogo: true, hasVignette: true,
                outputs: [
                    { name: 'Small Capsule.png', w: 462, h: 174 }
                ]
            },
            {
                id: 'main',
                name: 'Main Capsule',
                desc: 'Generates Main Capsule (1232x706)',
                primaryW: 1232, primaryH: 706,
                hasBg: true, hasLogo: true, hasVignette: true,
                outputs: [
                    { name: 'Main Capsule.png', w: 1232, h: 706 }
                ]
            },
            {
                id: 'vertical',
                name: 'Vertical Capsule',
                desc: 'Generates Vertical Capsule (748x896)',
                primaryW: 748, primaryH: 896,
                hasBg: true, hasLogo: true, hasVignette: true,
                outputs: [
                    { name: 'Vertical Capsule.png', w: 748, h: 896 },
                ]
            },
            {
                id: 'library',
                name: 'Library Capsule',
                desc: 'Generates Library Capsule (600x900)',
                primaryW: 600, primaryH: 900,
                hasBg: true, hasLogo: true, hasVignette: true,
                outputs: [
                    { name: 'Library Capsule.png', w: 600, h: 900 }
                ]
            },
            {
                id: 'hero',
                name: 'Library Hero',
                desc: 'Generates Library Hero (3840x1240) - Artwork only',
                primaryW: 3840, primaryH: 1240,
                hasBg: true, hasLogo: false, hasVignette: false, // Excluded per prompt
                outputs: [
                    { name: 'Library Hero.png', w: 3840, h: 1240 }
                ]
            },
            {
                id: 'liblogo',
                name: 'Library Logo',
                desc: 'Generates Library Logo (max 1280x720) - Logo only',
                primaryW: 1280, primaryH: 720,
                hasBg: false, hasLogo: true, hasVignette: false,
                outputs: [
                    { name: 'Library Logo.png', w: 1280, h: 720 }
                ]
            }
        ];

        // Initialize unique state mapping from deep copies of DEFAULTS
        const state = {};
        configs.forEach(c => {
            state[c.id] = { ...DEFAULTS };
        });

        // Initialize UI
        const container = document.getElementById('capsules-container');
        configs.forEach(conf => {
            const card = document.createElement('div');
            card.className = 'capsule-card';

            // Build Controls HTML
            let controlsHTML = `<div class="controls">
                <h3>${conf.name}</h3>
                <p style="font-size: 13px; color: #888; margin-top:-10px;">${conf.desc}</p>`;

            if (conf.hasBg) {
                controlsHTML += `
                <div class="control-group">
                    <h4>Background</h4>
                    ${createSlider(conf.id, 'bgS', 'Scale', 0.1, 3.0, 0.01)}
                    ${createSlider(conf.id, 'bgX', 'Translate X', -2000, 2000, 1)}
                    ${createSlider(conf.id, 'bgY', 'Translate Y', -2000, 2000, 1)}
                </div>`;
            }

            if (conf.hasVignette) {
                controlsHTML += `
                <div class="control-group">
                    <h4>Vignette (Circular)</h4>
                    ${createSlider(conf.id, 'vigStr', 'Strength', 0.0, 1.0, 0.01)}
                    ${createSlider(conf.id, 'vigWid: Width', 'Width', 0.0, 1.0, 0.01)}
                </div>`;
            }

            if (conf.hasLogo) {
                controlsHTML += `
                <div class="control-group">
                    <h4>Logo</h4>
                    ${createSlider(conf.id, 'logoS', 'Scale', 0.1, 3.0, 0.01)}
                    ${createSlider(conf.id, 'logoX', 'Translate X', -2000, 2000, 1)}
                    ${createSlider(conf.id, 'logoY', 'Translate Y', -2000, 2000, 1)}
                </div>`;
            }
            controlsHTML += `</div>`;

            card.innerHTML = `
                <div class="preview-container">
                    <canvas id="canvas-${conf.id}" width="${conf.primaryW}" height="${conf.primaryH}"></canvas>
                </div>
                ${controlsHTML}
            `;
            container.appendChild(card);
        });

        // Helper to fix width label weirdness in control gen loop
        function parseCleanParam(paramWithLabel) {
            if (paramWithLabel.includes(':')) {
                return paramWithLabel.split(': ')[0].trim();
            }
            return paramWithLabel;
        }

        function createSlider(id, paramWithLabel, label, min, max, step) {
            const param = parseCleanParam(paramWithLabel);
            return `
            <div class="slider-row">
                <label>${label}</label>
                <input type="range" id="${id}-${param}" min="${min}" max="${max}" step="${step}">
                <input type="number" id="${id}-${param}-num" min="${min}" max="${max}" step="${step}">
                <button type="button" class="btn-reset" id="${id}-${param}-reset" title="Reset to default">⟲</button>
            </div>`;
        }

        // Attach event listeners for controls
        configs.forEach(conf => {
            const paramsToBind = ['bgS', 'bgX', 'bgY', 'logoS', 'logoX', 'logoY'];
            if (conf.hasVignette) paramsToBind.push('vigStr', 'vigWid');

            paramsToBind.forEach(param => {
                // Pre-flight checks based on config capability
                if ((param.startsWith('bg') && !conf.hasBg)) return;
                if ((param.startsWith('logo') && !conf.hasLogo)) return;
                if ((param.startsWith('vig') && !conf.hasVignette)) return;

                const range = document.getElementById(`${conf.id}-${param}`);
                const num = document.getElementById(`${conf.id}-${param}-num`);
                const resetBtn = document.getElementById(`${conf.id}-${param}-reset`);

                // Helper to ensure DOM elements exist before binding (handles conditional rendering)
                if (!range || !num || !resetBtn) return;

                const updateParam = (val) => {
                    let v = parseFloat(val);
                    if (isNaN(v)) return;
                    state[conf.id][param] = v;
                    range.value = v;
                    num.value = v;
                    renderCanvas(conf.id);
                    saveStateToUrl();
                };

                range.addEventListener('input', e => {
                    num.value = e.target.value;
                    updateParam(e.target.value);
                });
                num.addEventListener('input', e => {
                    range.value = e.target.value;
                    updateParam(e.target.value);
                });
                resetBtn.addEventListener('click', () => {
                    updateParam(DEFAULTS[param]);
                });
            });
        });

        // URL Parameters Logic
        function getRelevantParamsForConfig(conf) {
            const params = ['bgS', 'bgX', 'bgY', 'logoS', 'logoX', 'logoY'];
            if (conf.hasVignette) params.push('vigStr', 'vigWid');
            return params;
        }

        function loadStateFromUrl() {
            const params = new URLSearchParams(window.location.search);
            configs.forEach(conf => {
                getRelevantParamsForConfig(conf).forEach(param => {
                    const key = `${conf.id}_${param}`;
                    if (params.has(key)) {
                        state[conf.id][param] = parseFloat(params.get(key));
                    }
                });
            });
            // Update UI
            configs.forEach(conf => {
                getRelevantParamsForConfig(conf).forEach(param => {
                    if ((param.startsWith('bg') && !conf.hasBg)) return;
                    if ((param.startsWith('logo') && !conf.hasLogo)) return;
                    if ((param.startsWith('vig') && !conf.hasVignette)) return;

                    const rangeEl = document.getElementById(`${conf.id}-${param}`);
                    const numEl = document.getElementById(`${conf.id}-${param}-num`);
                    if (rangeEl && numEl) {
                        rangeEl.value = state[conf.id][param];
                        numEl.value = state[conf.id][param];
                    }
                });
            });
        }

        function saveStateToUrl() {
            const params = new URLSearchParams();
            configs.forEach(conf => {
                getRelevantParamsForConfig(conf).forEach(param => {
                    const val = state[conf.id][param];
                    // Only save if not default to keep URL manageable
                    if (val !== DEFAULTS[param]) {
                        params.set(`${conf.id}_${param}`, val);
                    }
                });
            });
            const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
            window.history.replaceState({}, '', newUrl);
        }

        // Render functions
        function drawCompositedImage(ctx, config, targetW, targetH) {
            ctx.clearRect(0, 0, targetW, targetH);
            const st = state[config.id];

            // 1. Draw Background
            if (config.hasBg && imgBg) {
                // Base scale: "Cover" strategy based on primary dimensions
                const baseBgScale = Math.max(config.primaryW / imgBg.width, config.primaryH / imgBg.height);
                const finalW = imgBg.width * baseBgScale * st.bgS;
                const finalH = imgBg.height * baseBgScale * st.bgS;

                const cx = targetW / 2 + st.bgX;
                const cy = targetH / 2 + st.bgY;

                ctx.drawImage(imgBg, cx - finalW / 2, cy - finalH / 2, finalW, finalH);
            }

            // 2. Apply Vignette (Always Circular, between BG and Logo)
            if (config.hasVignette && config.hasBg && st.vigStr > 0) {
                ctx.save();

                // To ensure it's always circular, we use the larger dimension or diagonal as max radius
                const centerX = targetW / 2;
                const centerY = targetH / 2;

                // Max radius is distance from center to furthest corner to ensure full coverage
                const maxRadius = Math.sqrt(Math.pow(targetW / 2, 2) + Math.pow(targetH / 2, 2));

                // Width defines where the gradient starts fading (0 = center, 1 = edge)
                const innerRadius = maxRadius * (1 - st.vigWid);

                const gradient = ctx.createRadialGradient(
                    centerX, centerY, innerRadius, // Inner circle (transparent)
                    centerX, centerY, maxRadius    // Outer circle (dark)
                );

                // Start transparent in center
                gradient.addColorStop(0, 'rgba(0,0,0,0)');
                // End at specified darkness at edges
                gradient.addColorStop(1, `rgba(0,0,0,${st.vigStr})`);

                ctx.fillStyle = gradient;
                // Use source-over to darken existing background
                ctx.fillRect(0, 0, targetW, targetH);

                ctx.restore();
            }

            // 3. Draw Logo
            if (config.hasLogo && imgLogo) {
                // Base scale: "Contain" strategy with 20% padding
                const baseLogoScale = Math.min(config.primaryW / imgLogo.width, config.primaryH / imgLogo.height) * 0.8;
                const finalW = imgLogo.width * baseLogoScale * st.logoS;
                const finalH = imgLogo.height * baseLogoScale * st.logoS;

                const cx = targetW / 2 + st.logoX;
                const cy = targetH / 2 + st.logoY;

                ctx.drawImage(imgLogo, cx - finalW / 2, cy - finalH / 2, finalW, finalH);
            }
        }

        function renderCanvas(configId) {
            const conf = configs.find(c => c.id === configId);
            const canvas = document.getElementById(`canvas-${configId}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            drawCompositedImage(ctx, conf, canvas.width, canvas.height);
        }

        function renderAll() {
            configs.forEach(c => renderCanvas(c.id));
        }

        // File handling
        function handleFile(file, type) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    if (type === 'bg') imgBg = img;
                    else imgLogo = img;

                    document.getElementById(`drop-${type}`).style.borderColor = '#66c0f4';
                    document.getElementById('btn-download').disabled = (!imgBg && !imgLogo);
                    renderAll();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Setup Drag and Drop
        ['bg', 'logo'].forEach(type => {
            const dropZone = document.getElementById(`drop-${type}`);
            const input = document.getElementById(`file-${type}`);

            input.addEventListener('change', e => handleFile(e.target.files[0], type));

            dropZone.addEventListener('dragover', e => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            dropZone.addEventListener('dragleave', e => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });
            dropZone.addEventListener('drop', e => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    handleFile(e.dataTransfer.files[0], type);
                }
            });
        });

        // Download logic
        document.getElementById('btn-download').addEventListener('click', async () => {
            const zip = new JSZip();
            const btn = document.getElementById('btn-download');
            btn.disabled = true;
            btn.textContent = 'Generating...';

            const offscreenCanvas = document.createElement('canvas');
            const offCtx = offscreenCanvas.getContext('2d');

            for (const conf of configs) {
                for (const output of conf.outputs) {
                    // Resize hidden canvas to exact required asset dimensions
                    offscreenCanvas.width = output.w;
                    offscreenCanvas.height = output.h;

                    // Draw using the shared configuration offsets
                    drawCompositedImage(offCtx, conf, output.w, output.h);

                    // Convert to blob and add to zip
                    const blob = await new Promise(resolve => offscreenCanvas.toBlob(resolve, 'image/png'));
                    zip.file(output.name, blob);
                }
            }

            // Save ZIP
            const content = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'steam_assets.zip';
            a.click();
            URL.revokeObjectURL(url);

            btn.disabled = false;
            btn.textContent = 'Download All as ZIP';
        });

        // Initialization
        loadStateFromUrl();
    </script>
</body>

</html>
