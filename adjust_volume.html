<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAV Batch Volume Modifier (dB Scale + Reset)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease, opacity 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        #save-btn {
            background-color: #10b981;
        }

        #save-btn:hover {
            background-color: #059669;
        }

        main {
            margin-top: 100px;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        #drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background-color: rgba(30, 41, 59, 0.3);
            cursor: pointer;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        #drop-zone.dragover {
            border-color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.1);
        }

        #drop-zone p {
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        #file-input-label {
            font-size: 0.9rem;
        }

        #track-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .track-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.95rem;
        }

        .track-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            width: 65%;
            justify-content: flex-end;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 75%;
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: var(--border-color);
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            border: none;
        }

        .volume-label {
            font-size: 0.85rem;
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
            width: 65px;
            text-align: right;
        }

        .reset-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 4px;
            transition: color 0.2s, background-color 0.2s;
        }

        .reset-btn:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .reset-btn svg {
            width: 16px;
            height: 16px;
        }

        .play-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            transition: background 0.2s;
        }

        .play-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <header>
        <h1>WAV Batch Volume Modifier</h1>
        <button id="save-btn" class="btn" disabled>
            <svg style="width:18px;height:18px" viewBox="0 0 24 24">
                <path fill="currentColor" d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z" />
            </svg>
            Save All as ZIP
        </button>
    </header>

    <main>
        <div id="drop-zone">
            <svg style="width:48px;height:48px;color:var(--text-muted);margin-bottom:12px;" viewBox="0 0 24 24">
                <path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" />
            </svg>
            <p>Drag & Drop a Folder containing WAV files here</p>
            <p>or</p>
            <label class="btn" id="file-input-label">
                Select Folder
                <input type="file" id="folder-input" webkitdirectory directory multiple class="hidden">
            </label>
        </div>

        <div id="track-list">
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const folderInput = document.getElementById('folder-input');
        const trackListContainer = document.getElementById('track-list');
        const saveBtn = document.getElementById('save-btn');

        let tracks = [];
        let currentlyPlayingId = null;
        let playbackCtx = null;

        // --- Drag & Drop Handlers ---
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');

            const items = e.dataTransfer.items;
            let filesFound = [];

            if (items) {
                for (let i = 0; i < items.length; i++) {
                    const item = items[i].webkitGetAsEntry();
                    if (item) {
                        await traverseFileTree(item, filesFound);
                    }
                }
                processFiles(filesFound);
            }
        });

        folderInput.addEventListener('change', (e) => {
            processFiles(Array.from(e.target.files));
        });

        async function traverseFileTree(item, filesFound) {
            if (item.isFile) {
                const file = await new Promise((resolve) => item.file(resolve));
                if (file.name.toLowerCase().endsWith('.wav')) {
                    filesFound.push(file);
                }
            } else if (item.isDirectory) {
                const dirReader = item.createReader();
                const entries = await new Promise((resolve) => {
                    dirReader.readEntries(resolve);
                });
                for (let i = 0; i < entries.length; i++) {
                    await traverseFileTree(entries[i], filesFound);
                }
            }
        }

        function processFiles(files) {
            const wavFiles = files.filter(f => f.name.toLowerCase().endsWith('.wav'));

            if (wavFiles.length === 0) {
                alert("No WAV files found in the selection!");
                return;
            }

            if (currentlyPlayingId !== null) {
                const activeTrack = tracks.find(t => t.id === currentlyPlayingId);
                if (activeTrack) activeTrack.audio.pause();
            }

            tracks = [];
            trackListContainer.innerHTML = '';
            currentlyPlayingId = null;

            wavFiles.forEach((file, index) => {
                const trackId = `track-${index}`;
                const audioUrl = URL.createObjectURL(file);
                const audioEl = new Audio(audioUrl);

                const trackObj = {
                    id: trackId,
                    name: file.name,
                    file: file,
                    audio: audioEl,
                    gainNode: null,
                    volume: 1.0
                };

                tracks.push(trackObj);
                renderTrackWidget(trackObj);

                audioEl.addEventListener('ended', () => {
                    currentlyPlayingId = null;
                    updatePlayButtonUI(trackId, false);
                });
            });

            saveBtn.disabled = false;
        }

        // --- UI Rendering logic ---
        function renderTrackWidget(track) {
            const card = document.createElement('div');
            card.className = 'track-card';
            card.id = `card-${track.id}`;

            card.innerHTML = `
                <div class="track-info">
                    <div class="track-name" title="${track.name}">${track.name}</div>
                </div>
                <div class="track-controls">
                    <div class="volume-container">
                        <input type="range" class="volume-slider" min="-60" max="24" step="0.5" value="0" id="slider-${track.id}">
                        <span class="volume-label" id="label-${track.id}">0.0 dB</span>
                        <button class="reset-btn" id="reset-btn-${track.id}" title="Reset to 0.0 dB">
                            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12,5V1L7,6L12,11V7A6,6 0 0,1 18,13A6,6 0 0,1 12,19A6,6 0 0,1 6,13H4A8,8 0 0,0 12,21A8,8 0 0,0 20,13A8,8 0 0,0 12,5Z"/></svg>
                        </button>
                    </div>
                    <button class="play-btn" id="play-btn-${track.id}">
                        <svg viewBox="0 0 24 24" id="icon-${track.id}"><path d="M8,5V19L19,12L8,5Z"/></svg>
                    </button>
                </div>
            `;

            trackListContainer.appendChild(card);

            const slider = card.querySelector(`#slider-${track.id}`);
            const label = card.querySelector(`#label-${track.id}`);
            const resetBtn = card.querySelector(`#reset-btn-${track.id}`);

            // Shared input conversion listener logic
            function updateVolume(db) {
                let linearGain;
                if (db <= -60) {
                    linearGain = 0;
                    label.textContent = '-∞ dB';
                } else {
                    linearGain = Math.pow(10, db / 20);
                    label.textContent = (db > 0 ? '+' : '') + db.toFixed(1) + ' dB';
                }

                track.volume = linearGain;
                if (track.gainNode) {
                    track.gainNode.gain.value = linearGain;
                }
            }

            slider.addEventListener('input', (e) => {
                updateVolume(parseFloat(e.target.value));
            });

            // Reset Button Click Event handler
            resetBtn.addEventListener('click', () => {
                slider.value = 0;
                updateVolume(0);
            });

            const playBtn = card.querySelector(`#play-btn-${track.id}`);
            playBtn.addEventListener('click', () => togglePlay(track.id));
        }

        function togglePlay(trackId) {
            if (!playbackCtx) {
                playbackCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (playbackCtx.state === 'suspended') {
                playbackCtx.resume();
            }

            const currentTrack = tracks.find(t => t.id === trackId);
            if (!currentTrack) return;

            if (currentlyPlayingId === trackId) {
                currentTrack.audio.pause();
                currentTrack.audio.currentTime = 0;
                currentlyPlayingId = null;
                updatePlayButtonUI(trackId, false);
            } else {
                if (currentlyPlayingId !== null) {
                    const activeTrack = tracks.find(t => t.id === currentlyPlayingId);
                    if (activeTrack) {
                        activeTrack.audio.pause();
                        activeTrack.audio.currentTime = 0;
                        updatePlayButtonUI(currentlyPlayingId, false);
                    }
                }

                if (!currentTrack.gainNode) {
                    const source = playbackCtx.createMediaElementSource(currentTrack.audio);
                    currentTrack.gainNode = playbackCtx.createGain();
                    source.connect(currentTrack.gainNode);
                    currentTrack.gainNode.connect(playbackCtx.destination);
                }

                currentTrack.gainNode.gain.value = currentTrack.volume;

                currentTrack.audio.play();
                currentlyPlayingId = trackId;
                updatePlayButtonUI(trackId, true);
            }
        }

        function updatePlayButtonUI(trackId, isPlaying) {
            const icon = document.getElementById(`icon-${trackId}`);
            if (!icon) return;
            if (isPlaying) {
                icon.innerHTML = `<path d="M18,18H6V6H18V18Z"/>`;
            } else {
                icon.innerHTML = `<path d="M8,5V19L19,12L8,5Z"/>`;
            }
        }

        // --- Export Logic ---
        saveBtn.addEventListener('click', async () => {
            if (tracks.length === 0) return;

            saveBtn.disabled = true;
            saveBtn.textContent = "Processing and Zipping...";

            const zip = new JSZip();
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            try {
                for (const track of tracks) {
                    const arrayBuffer = await track.file.arrayBuffer();
                    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

                    const adjustedWavBlob = bufferToWav(audioBuffer, track.volume);
                    zip.file(track.name, adjustedWavBlob);
                }

                const zipContent = await zip.generateAsync({ type: 'blob' });
                const downloadLink = document.createElement('a');
                downloadLink.href = URL.createObjectURL(zipContent);
                downloadLink.download = 'volume_adjusted_tracks.zip';
                downloadLink.click();

            } catch (err) {
                console.error(err);
                alert("Error processing audio data files.");
            } finally {
                audioCtx.close();
                saveBtn.disabled = false;
                saveBtn.innerHTML = `<svg style="width:18px;height:18px" viewBox="0 0 24 24"><path fill="currentColor" d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z"/></svg> Save All as ZIP`;
            }
        });

        // --- Custom Binary 16-Bit Signed Int PCM WAV Encoder ---
        function bufferToWav(buffer, volumeMultiplier) {
            const numOfChan = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1;
            const bitDepth = 16;
            const totalSamples = buffer.length;
            const dataByteLength = totalSamples * numOfChan * 2;
            const fileHeaderByteLength = 44;

            const arrayBuffer = new ArrayBuffer(fileHeaderByteLength + dataByteLength);
            const view = new DataView(arrayBuffer);

            function writeString(offset, string) {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            }

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataByteLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numOfChan, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numOfChan * 2, true);
            view.setUint16(32, numOfChan * 2, true);
            view.setUint16(34, bitDepth, true);
            writeString(36, 'data');
            view.setUint32(40, dataByteLength, true);

            const channelArrays = [];
            for (let c = 0; c < numOfChan; c++) {
                channelArrays.push(buffer.getChannelData(c));
            }

            let byteOffset = 44;
            for (let i = 0; i < totalSamples; i++) {
                for (let c = 0; c < numOfChan; c++) {
                    let sample = channelArrays[c][i] * volumeMultiplier;

                    if (sample > 1) sample = 1;
                    else if (sample < -1) sample = -1;

                    sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(byteOffset, sample, true);
                    byteOffset += 2;
                }
            }

            return new Blob([arrayBuffer], { type: 'audio/wav' });
        }
    </script>
</body>

</html>
